name: FFmpeg 8.1 Android CLI APK (FULL AUTO)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y wget unzip zip git openjdk-17-jdk

      # =========================
      # 下载 NDK
      # =========================
      - name: 下载 NDK r25c
        run: |
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r25c ndk

      # =========================
      # 下载 FFmpeg
      # =========================
      - name: 下载 FFmpeg 8.1
        run: |
          wget -O ffmpeg.tar.gz https://ffmpeg.org/releases/ffmpeg-8.1.tar.gz
          tar xf ffmpeg.tar.gz
          mv ffmpeg-8.1 ffmpeg

      # =========================
      # 编译 FFmpeg（已修复 strip）
      # =========================
      - name: 编译 FFmpeg
        run: |
          cd ffmpeg

          NDK=$GITHUB_WORKSPACE/ndk
          API=24
          TC=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          ./configure \
            --prefix=$GITHUB_WORKSPACE/out \
            --target-os=android \
            --arch=arm \
            --cpu=armv7a \
            --cc=$TC/bin/armv7a-linux-androideabi$API-clang \
            --cxx=$TC/bin/armv7a-linux-androideabi$API-clang++ \
            --enable-cross-compile \
            --enable-neon \
            --enable-mediacodec \
            --enable-jni \
            --enable-ffmpeg \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-stripping \
            --enable-decoder=h264,hevc \
            --enable-encoder=h264_mediacodec,hevc_mediacodec \
            --enable-filter=scale \
            --enable-muxer=mp4 \
            --enable-demuxer=mp4 \
            --enable-protocol=file

          make -j4
          make install

      # =========================
      # 创建最小 Android 工程
      # =========================
      - name: 创建 Android 项目
        run: |
          mkdir -p project/app/src/main/assets
          mkdir -p project/app/src/main/java/com/example/ffmpegcli

          cd project

          # settings.gradle
          echo "include ':app'" > settings.gradle

          # 根 build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.0.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # app/build.gradle
          mkdir -p app
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              compileSdkVersion 30

              defaultConfig {
                  applicationId "com.example.ffmpegcli"
                  minSdkVersion 24
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # AndroidManifest
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.ffmpegcli">

              <application
                  android:label="FFmpeg CLI"
                  android:hasCode="false" />

          </manifest>
          EOF

      # =========================
      # 放入 ffmpeg
      # =========================
      - name: 拷贝 ffmpeg
        run: |
          cp out/bin/ffmpeg project/app/src/main/assets/ffmpeg
          chmod +x project/app/src/main/assets/ffmpeg

      # =========================
      # 安装 Gradle
      # =========================
      - name: 安装 Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
          unzip -q gradle-7.5-bin.zip
          mv gradle-7.5 gradle

          cat > gradlew << 'EOF'
          #!/bin/bash
          ./gradle/bin/gradle "$@"
          EOF

          chmod +x gradlew

      # =========================
      # 构建 APK
      # =========================
      - name: 构建 APK
        run: |
          cd project
          ../gradlew assembleDebug

      # =========================
      # 导出 APK
      # =========================
      - name: 导出 APK
        run: |
          mkdir -p dist
          cp project/app/build/outputs/apk/debug/app-debug.apk dist/FFmpeg81.apk

      # =========================
      # 上传
      # =========================
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-Android-APK
          path: dist/FFmpeg81.apk
