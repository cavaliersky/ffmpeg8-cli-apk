name: Build FFmpeg 8.1 Android APK (H264+H265硬编)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential wget unzip zip

      # --------------- 修复 404 这里 ---------------
      - name: 下载 Android NDK r25c（官方正确地址）
        run: |
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r25c ndk

      - name: 下载 FFmpeg 8.1
        run: |
          wget -O ffmpeg.tar.gz https://ffmpeg.org/releases/ffmpeg-8.1.tar.gz
          tar xf ffmpeg.tar.gz
          mv ffmpeg-8.1 ffmpeg

      - name: 编译 FFmpeg 8.1 armv7a（开启H264+H265硬编）
        run: |
          cd ffmpeg
          NDK=$GITHUB_WORKSPACE/ndk
          API=24
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          ./configure \
            --prefix=$GITHUB_WORKSPACE/build \
            --target-os=android \
            --arch=arm \
            --cpu=armv7a \
            --cc=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang \
            --cxx=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang++ \
            --enable-cross-compile \
            --enable-neon \
            --enable-mediacodec \
            --enable-jni \
            --enable-hwaccels \
            --enable-ffmpeg \
            --disable-static \
            --enable-shared \
            --disable-doc \
            --disable-network \
            --disable-everything \
            --enable-decoder=h264,hevc,mpeg4 \
            --enable-encoder=h264_mediacodec,hevc_mediacodec \
            --enable-hwaccel=h264_mediacodec,hevc_mediacodec \
            --enable-filter=scale,trim,concat \
            --enable-muxer=mp4 \
            --enable-demuxer=mp4,mov \
            --enable-protocol=file

          make -j4
          make install
          cd ..

      - name: 下载安卓CLI模板并替换ffmpeg
        run: |
          git clone https://github.com/ethanhua/FFmpeg-Android-CLI.git
          cp build/bin/ffmpeg FFmpeg-Android-CLI/app/src/main/assets/ffmpeg
          chmod +x FFmpeg-Android-CLI/app/src/main/assets/ffmpeg

      - name: 打包APK
        run: |
          cd FFmpeg-Android-CLI
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..
          mkdir -p output
          cp FFmpeg-Android-CLI/app/build/outputs/apk/release/app-release.apk output/FFmpeg_8.1_H265.apk

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg_8.1_APK
          path: output/
