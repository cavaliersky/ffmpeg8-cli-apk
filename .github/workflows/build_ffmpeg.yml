name: FFmpeg CLI APK (UI + RUN)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y wget unzip zip git openjdk-17-jdk

      # =========================
      # NDK
      # =========================
      - name: 下载 NDK
        run: |
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r25c ndk

      # =========================
      # FFmpeg
      # =========================
      - name: 下载 FFmpeg
        run: |
          wget -O ffmpeg.tar.gz https://ffmpeg.org/releases/ffmpeg-8.1.tar.gz
          tar xf ffmpeg.tar.gz
          mv ffmpeg-8.1 ffmpeg

      - name: 编译 FFmpeg
        run: |
          cd ffmpeg

          NDK=$GITHUB_WORKSPACE/ndk
          API=24
          TC=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          ./configure \
            --prefix=$GITHUB_WORKSPACE/out \
            --target-os=android \
            --arch=arm \
            --cpu=armv7a \
            --cc=$TC/bin/armv7a-linux-androideabi$API-clang \
            --enable-cross-compile \
            --enable-neon \
            --enable-mediacodec \
            --enable-jni \
            --enable-ffmpeg \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-stripping \
            --enable-decoder=h264,hevc \
            --enable-filter=scale \
            --enable-muxer=mp4 \
            --enable-demuxer=mp4 \
            --enable-protocol=file

          make -j4
          make install

      # =========================
      # 创建 Android 项目（核心）
      # =========================
      - name: 创建项目
        run: |
          mkdir -p project/app/src/main/java/com/example/ffmpegcli
          mkdir -p project/app/src/main/res/layout
          mkdir -p project/app/src/main/assets

          cd project

          echo "include ':app'" > settings.gradle

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.0.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              compileSdkVersion 30

              defaultConfig {
                  applicationId "com.example.ffmpegcli"
                  minSdkVersion 24
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # Manifest 加入读写权限与所有文件访问权限
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.ffmpegcli">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>

              <application 
                  android:label="FFmpeg CLI"
                  android:requestLegacyExternalStorage="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>

          </manifest>
          EOF

          # UI 布局
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:orientation="vertical"
              android:padding="8dp"
              android:layout_width="match_parent"
              android:layout_height="match_parent">

              <EditText
                  android:id="@+id/input"
                  android:hint="输入 ffmpeg 命令 (例如: -i /sdcard/in.mp4 /sdcard/out.mp4)"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"/>

              <Button
                  android:id="@+id/run"
                  android:text="运行"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"/>

              <ScrollView
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1">

                  <TextView
                      android:id="@+id/log"
                      android:textSize="12sp"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"/>

              </ScrollView>

          </LinearLayout>
          EOF

          # Java 代码（加入了动态权限申请逻辑）
          cat > app/src/main/java/com/example/ffmpegcli/MainActivity.java << 'EOF'
          package com.example.ffmpegcli;

          import android.Manifest;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.Settings;
          import android.widget.*;
          import java.io.*;

          public class MainActivity extends Activity {

              TextView logView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  // 在启动时申请存储权限
                  requestStoragePermission();

                  EditText input = findViewById(R.id.input);
                  Button run = findViewById(R.id.run);
                  logView = findViewById(R.id.log);

                  String ffmpegPath = copyFFmpeg();

                  run.setOnClickListener(v -> {
                      logView.setText("");
                      new Thread(() -> runCmd(ffmpegPath + " " + input.getText().toString())).start();
                  });
              }

              private void requestStoragePermission() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      // Android 11+ 请求"所有文件访问权限"
                      if (!Environment.isExternalStorageManager()) {
                          try {
                              Intent intent = new Intent(Settings.ACTION_MANAGE_APP_ALL_FILES_ACCESS_PERMISSION);
                              intent.addCategory("android.intent.category.DEFAULT");
                              intent.setData(Uri.parse("package:" + getPackageName()));
                              startActivityForResult(intent, 100);
                          } catch (Exception e) {
                              Intent intent = new Intent(Settings.ACTION_MANAGE_ALL_FILES_ACCESS_PERMISSION);
                              startActivityForResult(intent, 100);
                          }
                      }
                  } else if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      // Android 6.0 ~ 10 请求常规读写权限
                      if (checkSelfPermission(Manifest.permission.WRITE_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE, Manifest.permission.READ_EXTERNAL_STORAGE}, 100);
                      }
                  }
              }

              private String copyFFmpeg() {
                  File file = new File(getFilesDir(), "ffmpeg");
                  if (file.exists()) return file.getAbsolutePath();

                  try {
                      InputStream in = getAssets().open("ffmpeg");
                      FileOutputStream out = new FileOutputStream(file);
                      byte[] buf = new byte[4096];
                      int len;
                      while ((len = in.read(buf)) > 0) out.write(buf, 0, len);
                      in.close();
                      out.close();
                      file.setExecutable(true);
                  } catch (Exception e) {}

                  return file.getAbsolutePath();
              }

              private void runCmd(String cmd) {
                  try {
                      Process p = Runtime.getRuntime().exec(cmd);

                      BufferedReader br = new BufferedReader(new InputStreamReader(p.getInputStream()));
                      BufferedReader er = new BufferedReader(new InputStreamReader(p.getErrorStream()));

                      String line;
                      while ((line = br.readLine()) != null) append(line);
                      while ((line = er.readLine()) != null) append(line);

                  } catch (Exception e) {
                      append(e.toString());
                  }
              }

              private void append(String s) {
                  runOnUiThread(() -> logView.append(s + "\n"));
              }
          }
          EOF

      # =========================
      # 放入 ffmpeg
      # =========================
      - name: 拷贝 ffmpeg
        run: |
          cp out/bin/ffmpeg project/app/src/main/assets/ffmpeg
          chmod +x project/app/src/main/assets/ffmpeg

      # =========================
      # Gradle
      # =========================
      - name: 安装 Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
          unzip -q gradle-7.5-bin.zip
          mv gradle-7.5 gradle

          cat > gradlew << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          "$DIR/gradle/bin/gradle" "$@"
          EOF
          chmod +x gradlew

      # =========================
      # 构建
      # =========================
      - name: 构建 APK
        run: |
          ./gradlew -p project assembleDebug

      # =========================
      # 输出
      # =========================
      - name: 导出 APK
        run: |
          mkdir -p dist
          cp project/app/build/outputs/apk/debug/app-debug.apk dist/ffmpeg-cli.apk

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-cli
          path: dist/ffmpeg-cli.apk
