name: FFmpeg 8.1 Android CLI APK (H264+H265 зЎ¬зј–)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ж‹‰д»Јз Ѓ
        uses: actions/checkout@v4

      - name: е®‰иЈ…дѕќиµ–
        run: |
          sudo apt update
          sudo apt install -y wget unzip zip git

      # =========================
      # дё‹иЅЅ NDK
      # =========================
      - name: дё‹иЅЅ NDK r25c
        run: |
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r25c ndk

      # =========================
      # дё‹иЅЅ FFmpeg
      # =========================
      - name: дё‹иЅЅ FFmpeg 8.1
        run: |
          wget -O ffmpeg.tar.gz https://ffmpeg.org/releases/ffmpeg-8.1.tar.gz
          tar xf ffmpeg.tar.gz
          mv ffmpeg-8.1 ffmpeg

      # =========================
      # зј–иЇ‘ FFmpegпј€е…ій”®дї®е¤Ќпј‰
      # =========================
      - name: зј–иЇ‘ FFmpeg (armv7a-neon)
        run: |
          cd ffmpeg

          NDK=$GITHUB_WORKSPACE/ndk
          API=24
          TC=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          ./configure \
            --prefix=$GITHUB_WORKSPACE/out \
            --target-os=android \
            --arch=arm \
            --cpu=armv7a \
            --cc=$TC/bin/armv7a-linux-androideabi$API-clang \
            --cxx=$TC/bin/armv7a-linux-androideabi$API-clang++ \
            --enable-cross-compile \
            --enable-neon \
            --enable-mediacodec \
            --enable-jni \
            --enable-ffmpeg \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-stripping \
            --enable-decoder=h264,hevc \
            --enable-encoder=h264_mediacodec,hevc_mediacodec \
            --enable-filter=scale \
            --enable-muxer=mp4 \
            --enable-demuxer=mp4 \
            --enable-protocol=file

          make -j4
          make install

      # =========================
      # дё‹иЅЅ CLI жЁЎжќї
      # =========================
      - name: дё‹иЅЅжћЃз®Ђ CLI жЁЎжќї
        run: |
          git clone https://github.com/ethanhua/FFmpeg-Android-CLI.git

      # =========================
      # ж”ѕе…Ґ ffmpeg дєЊиї›е€¶
      # =========================
      - name: ж‹·иґќ ffmpeg
        run: |
          cp out/bin/ffmpeg FFmpeg-Android-CLI/app/src/main/assets/ffmpeg
          chmod +x FFmpeg-Android-CLI/app/src/main/assets/ffmpeg

      # =========================
      # жћ„е»є APK
      # =========================
      - name: жћ„е»є APK
        run: |
          cd FFmpeg-Android-CLI
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..

      # =========================
      # ж”¶й›†дє§з‰©
      # =========================
      - name: ж”¶й›† APK
        run: |
          mkdir -p dist
          cp FFmpeg-Android-CLI/app/build/outputs/apk/release/app-release.apk dist/FFmpeg81_HW.apk

      # =========================
      # дёЉдј 
      # =========================
      - name: дёЉдј  APK
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-Android-APK
          path: dist/FFmpeg81_HW.apk
