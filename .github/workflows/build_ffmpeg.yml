name: Build FFmpeg 8.1 Android APK (GK6323 зҰ¬зә–з‰€ H264+H265)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: е®‰иӘ…дңқиµ–
        run: |
          sudo apt update
          sudo apt install -y build-essential wget unzip zip

      - name: дё‹иҢҢ Android NDK r25cпә€дү®е¤Қ 404 жњ‰ж•€й“ңжҺӨпә‰
        run: |
          wget -O ndk.zip https://github.com/android/ndk/releases/download/r25c/android-ndk-r25c-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r25c ndk

      - name: дё‹иҢҢ FFmpeg 8.1
        run: |
          wget -O ffmpeg.tar.gz https://ffmpeg.org/releases/ffmpeg-8.1.tar.gz
          tar xf ffmpeg.tar.gz
          mv ffmpeg-8.1 ffmpeg

      - name: зә–иҮ‘ FFmpeg 8.1 ARMv7a (GK6323)
        run: |
          cd ffmpeg
          NDK=$GITHUB_WORKSPACE/ndk
          API=24
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          ./configure \
            --prefix=$GITHUB_WORKSPACE/build \
            --target-os=android \
            --arch=arm \
            --cpu=armv7a \
            --cc=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang \
            --cxx=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang++ \
            --enable-cross-compile \
            --enable-neon \
            --enable-mediacodec \
            --enable-jni \
            --enable-hwaccels \
            --enable-ffmpeg \
            --disable-static \
            --enable-shared \
            --disable-doc \
            --disable-network \
            --disable-everything \
            --enable-decoder=h264,hevc,mpeg4 \
            --enable-encoder=h264_mediacodec,hevc_mediacodec \
            --enable-hwaccel=h264_mediacodec,hevc_mediacodec \
            --enable-filter=scale,concat \
            --enable-muxer=mp4 \
            --enable-demuxer=mp4 \
            --enable-protocol=file

          make -j4
          make install
          cd ..

      - name: дё‹иҢҢ FFmpeg е®‰еҚ“е‘Ңд»¤иҰЊжЁҰжқү
        run: |
          git clone https://github.com/ethanhua/FFmpeg-Android-CLI.git
          cp build/bin/ffmpeg FFmpeg-Android-CLI/app/src/main/assets/ffmpeg
          chmod +x FFmpeg-Android-CLI/app/src/main/assets/ffmpeg

      - name: ж‰“еЊ… APK
        run: |
          cd FFmpeg-Android-CLI
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..
          mkdir -p output
          cp FFmpeg-Android-CLI/app/build/outputs/apk/release/app-release.apk output/FFmpeg81_GK6323_H264_H265.apk

      - name: дёЉдә  APK
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg_81_APK
          path: output/
